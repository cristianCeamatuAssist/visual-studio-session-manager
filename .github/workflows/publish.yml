name: Publish Extension

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - run: npm install

      - run: npm test

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o extension.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath extension.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX (Cursor / Windsurf / VSCodium)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish extension.vsix -p "$OVSX_PAT"
