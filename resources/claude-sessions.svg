<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window -->
  <rect x="2" y="3" width="20" height="18" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Terminal header bar -->
  <line x1="2" y1="7" x2="22" y2="7" stroke="currentColor" stroke-width="1.5"/>
  <!-- Window dots -->
  <circle cx="5" cy="5" r="0.8" fill="currentColor"/>
  <circle cx="7.5" cy="5" r="0.8" fill="currentColor"/>
  <circle cx="10" cy="5" r="0.8" fill="currentColor"/>
  <!-- Prompt cursor lines -->
  <line x1="5" y1="11" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="13" x2="5" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="15" x2="16" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Status dot (bottom right) -->
  <circle cx="19" cy="17" r="2.5" fill="currentColor"/>
</svg>
